services:

  postgres:
    image: postgres:16-alpine
    container_name: xplorenow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xplorenow
      POSTGRES_USER: xplorenow
      POSTGRES_PASSWORD: xplorenow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xplorenow -d xplorenow"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: xplorenow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@xplorenow.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
